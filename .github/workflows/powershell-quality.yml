name: PowerShell Quality

on:
    pull_request:
        branches:
            - "**"
    workflow_dispatch:

jobs:
    validate:
        runs-on: windows-latest

        steps:
            - name: Checkout
              uses: actions/checkout@v4

            - name: Parse all PowerShell scripts
              shell: pwsh
              run: |
                  $errors = @()
                  Get-ChildItem -Path . -Recurse -Filter *.ps1 |
                    Where-Object { $_.FullName -notmatch '\\.history\\' } |
                    ForEach-Object {
                      $tokens = $null
                      $parseErrors = $null
                      [void][System.Management.Automation.Language.Parser]::ParseFile($_.FullName, [ref]$tokens, [ref]$parseErrors)
                      if ($parseErrors -and $parseErrors.Count -gt 0) {
                        $errors += [pscustomobject]@{ File = $_.FullName; Errors = $parseErrors }
                      }
                    }

                  if ($errors.Count -gt 0) {
                    foreach ($entry in $errors) {
                      Write-Host "[FAIL] $($entry.File)"
                      foreach ($e in $entry.Errors) {
                        Write-Host "  - $($e.Message)"
                      }
                    }
                    throw "PowerShell parse validation failed."
                  }

                  Write-Host "PowerShell parse validation passed."

            - name: Install modules
              shell: pwsh
              run: |
                  Set-PSRepository -Name PSGallery -InstallationPolicy Trusted
                  Install-Module Pester -Scope CurrentUser -Force -SkipPublisherCheck
                  Install-Module PSScriptAnalyzer -Scope CurrentUser -Force -SkipPublisherCheck

            - name: Lint scripts with PSScriptAnalyzer
              shell: pwsh
              run: |
                  $scriptFiles = Get-ChildItem -Path . -Recurse -Filter *.ps1 |
                    Where-Object { $_.FullName -notmatch '\\.history\\' } |
                    Select-Object -ExpandProperty FullName

                  $results = Invoke-ScriptAnalyzer -Path $scriptFiles -Severity Error
                  if ($results) {
                    $results | Format-Table -AutoSize
                    throw "PSScriptAnalyzer found errors."
                  }
                  Write-Host "PSScriptAnalyzer passed with no errors."

            - name: Validate model profiles
              shell: pwsh
              run: |
                  . .\scripts\Validate-ModelProfile.ps1
                  Get-ChildItem -Path .\models -Filter *.json |
                    Where-Object { $_.Name -ne 'model-profile.schema.json' } |
                    ForEach-Object {
                      [void](Test-ModelProfileFile -ProfilePath $_.FullName -SchemaPath .\models\model-profile.schema.json)
                      Write-Host "[OK] $($_.Name)"
                    }

            - name: Run Pester tests
              shell: pwsh
              run: |
                  Invoke-Pester -Path .\tests -CI
